version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: capim_postgres
    restart: always
    environment:
      POSTGRES_USER: capim
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: capim
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: capim_api
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    env_file:
      - .env

volumes:
  postgres_data: